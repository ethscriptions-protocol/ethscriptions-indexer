services:
  - name: ethscriptions-api
    type: web
    runtime: ruby
    plan: starter
    branch: alt
    buildCommand: "bundle install"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: "/up"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethscriptions-db
          property: connectionString
      - key: RAILS_ENV
        value: production

  - name: ethscriptions-indexer
    type: worker
    runtime: ruby
    plan: starter
    branch: alt
    buildCommand: "bundle install"
    startCommand: "bundle exec clockwork config/main_importer_clock.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethscriptions-db
          property: connectionString
      - key: RAILS_ENV
        value: production

databases:
  - name: ethscriptions-db
    plan: basic-256mb
